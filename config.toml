# =============================================================================
# Gemini Prediction Market Pipeline — Configuration
# =============================================================================
# All values here are defaults.  Every parameter can be overridden at runtime
# with the matching CLI flag (e.g.  --poll-sec 30).

# -----------------------------------------------------------------------------
[data_collector]
# -----------------------------------------------------------------------------
poll_sec              = 60      # seconds between API polls

hourly_only           = true    # true  → next 1-hour EST contract only (default)
                                # false → all BTC/ETH/SOL contracts within
                                #         max_hours_to_collect hours
max_hours_to_collect  = 24.0    # used only when hourly_only = false
                                # skips any contract settling further than this

# -----------------------------------------------------------------------------
[simulation]
# -----------------------------------------------------------------------------
poll_sec         = 60       # seconds between simulation polls
min_edge         = 0.07     # minimum model edge required to enter a trade
                            # (e.g. 0.03 = model must show 3 cents of edge at ask)
max_hours_to_settle = 1.5   # ignore any contract settling more than this many hours
                            # away — guards against stale multi-day data in the CSV
min_hours_to_settle = 0.0   # ignore contracts with less than this many hours to settle (0 = disabled)
ewma_lambda      = 0.94     # EWMA decay factor λ (RiskMetrics default; higher = slower decay)
rho              = -0.5     # prior price-vol correlation used to initialise skewed-t γ
                            # typical crypto: negative (vol rises when price falls)
vol_veto_mult    = 2.0      # block all entries when 10-min realized vol > this × EWMA vol
                            # 2.0 = veto if recent market is 2x more volatile than calibrated
                            # 0.0 = disable veto

[simulation.exit]
# Early-exit conditions — checked every poll for every open position.
# Any condition that fires causes an immediate sell at the current bid price;
# realised P&L = bid_now - ask_entry.

profit_lock      = 0.10     # exit when bid_now - ask_entry >= this (absolute ¢ gain)
                            # NOTE: skipped when < 30 min to settlement — let winner expire

stop_loss        = 0.50     # exit when (ask_entry - bid_now) / ask_entry >= this
                            # RELATIVE to entry price: 0.50 = 50% drawdown from entry
                            # e.g. entered at 19¢ → stop at 9.5¢; 64¢ entry → stop at 32¢

p_drop           = 0.10     # exit when the model's probability for our side
                            # drops by this much vs. the entry probability
                            # (new data has made the bet worse; exit early)

edge_neg_thresh  = 0.02     # edge_closed only fires when edge <= -this value
                            # hysteresis: prevents exiting on momentary noise (e.g. edge=-0.001)
                            # 0.02 = model edge must be -2¢ before we declare "edge gone"

# -----------------------------------------------------------------------------
[simulation.lookback]
# Per-model calibration window (hours).
# Shorter windows track recent regime changes; longer windows improve MLE
# stability.  Each model's min_lr array is built independently so different
# models can use different amounts of historical data.

gbm    = 12.0    # rolling-window σ  — 720 bars plenty; shorter tracks intraday regime
ewma   = 24.0    # EWMA vol          — exp decay already weights recent; 1440 bars fine
garch  = 48.0    # GARCH(1,1) MLE   — MLE stable at 2880 bars; was 72h
stud   = 24.0    # Student's t       — ν identifiable from 1440 bars
skt    = 24.0    # Skewed t          — same as student_t
heston = 72.0    # Heston AR(1)      — needs hourly var time series; min 48h, keep 72h
hybrid      = 24.0    # Hybrid EWMA-σ + Student-t — EWMA vol (responsive) + t-tail from standardised residuals
ou          = 12.0    # OU on log-price — short window for local mean-reversion; AR(1) on 1-min closes
heston_ewma = 72.0    # Heston EWMA-θ  — same window as heston; was 96h

# Merton Jump-Diffusion variants
gbm_jump      = 24.0   # GBM + jump    — min 24h to see ≥2-3 jumps for λ estimate
ewma_jump     = 36.0   # EWMA + jump
garch_jump    = 48.0   # GARCH + jump
student_t_jump= 36.0   # StudentT + jump
hybrid_t_jump = 36.0   # HybridT + jump

# -----------------------------------------------------------------------------
[simulation.confidence]
# -----------------------------------------------------------------------------
# Confidence system: adjusts raw model edge by a [0,1] composite score before
# checking against min_edge.  edge_adj = raw_edge × total_conf.
#
# total_conf = pred_conf^λ1 × data_conf^λ2 × ensemble_conf^λ3
#   λ weights must sum to 1.0 (weighted geometric mean stays in [0,1]).
#   Setting a weight to 0 removes that component (x^0 = 1, neutral).
#
# pred_conf     = max(0, 1 - k × std(active_model p_fairs))
#   k (pred_conf_k) controls harshness:
#     k=3 → std=0.10 gives conf=0.70; std=0.33 gives conf=0.00
#     k=5 → std=0.10 gives conf=0.50; std=0.20 gives conf=0.00  (was default — too harsh)
#
# data_conf     = min(1, n_actual_bars / n_expected_bars)
#   Penalises OHLCV gaps; does NOT penalise short lookback windows
#   (short windows are a deliberate regime-adaptation design choice).
#
# ensemble_conf = 0.5 + 0.5 × (n_agree / n_active_models)
#   ∈ [0.5, 1.0]: 0.5 = half the models disagree; 1.0 = unanimous.

pred_conf_weight     = 0.55    # λ1: model disagreement component
data_conf_weight     = 0.10    # λ2: OHLCV data completeness component
ensemble_conf_weight = 0.35    # λ3: directional agreement component
pred_conf_k          = 3.0     # harshness: k=3 → std of 0.10 → conf=0.70

# Models used to compute pred_conf (std of p_fairs) and ensemble_conf
# (directional vote count).  Use the top-performing, diverse models.
# Valid names: gbm, ewma, garch, student_t, skewed_t, heston, hybrid_t,
#              ou, heston_ewma, gbm_jump, ewma_jump, garch_jump,
#              student_t_jump, hybrid_t_jump
active_models = ["heston_ewma", "garch", "student_t", "skewed_t", "garch_jump", "gbm_jump"]

# -----------------------------------------------------------------------------
[simulation.slippage]
# -----------------------------------------------------------------------------
# Sim-only friction model — makes simulation closer to live IOC execution.
# All three parameters are disabled (0.0) in live trading (trader is set).
#
# zero_fill_prob  — probability that an entry order returns 0 fills.
#   In live Gemini IOC trading, the market often moves between signal detection
#   and order execution.  0.15 = 15% of entries are silently skipped.
#   The contract stays eligible for re-evaluation on the next poll.
#
# entry_slip_max  — maximum additional cost added to entry ask (uniform [0, max]).
#   Models the staleness of CSV ask prices + IOC execution friction.
#   0.02 = at most 2¢ extra paid above the quoted ask (average cost = +1¢).
#
# exit_slip_max   — maximum bid penalty subtracted from the exit bid (uniform [0, max]).
#   Models bid deterioration when we actually hit the bid to exit early.
#   0.01 = at most 1¢ less received than the quoted bid (average = -0.5¢).

zero_fill_prob = 0.15   # fraction of sim entry orders that simulate a zero IOC fill
entry_slip_max = 0.02   # max extra cost at sim entry (¢ above quoted ask)
exit_slip_max  = 0.01   # max bid penalty at sim early exit (¢ below quoted bid)
